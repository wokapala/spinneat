server {
    listen 80;
    server_name _;

    root /var/www/frontend;
    index index.html;

    # ── Security headers ──
    add_header X-Frame-Options          "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options   "nosniff"                      always;
    add_header X-XSS-Protection         "1; mode=block"                always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy  "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ── Hide dotfiles ──
    location ~ /\.(?!well-known) { deny all; }

    # ── API requests → PHP-FPM ──
    location /api/ {
        root /var/www/backend/public;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # ── Frontend SPA – fallback to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Friendly error pages (served from frontend/errors/) ──
    # Not marked `internal` on purpose: the pages double as documentation
    # of the global error handling and must be reachable at /errors/*.html.
    error_page 400         /errors/400.html;
    error_page 401         /errors/401.html;
    error_page 403         /errors/403.html;
    error_page 404         /errors/404.html;
    error_page 500 502 503 504 /errors/500.html;
    location ^~ /errors/ {
        root /var/www/frontend;
    }
}
