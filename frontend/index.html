<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spin &amp; Eat 🎡</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎡</text></svg>" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="navbar__brand" data-page="home">
        <span class="navbar__logo">🎡</span>
        <span class="navbar__title">Spin &amp; Eat</span>
    </div>
    <button class="navbar__toggle" id="navToggle" aria-label="Menu">&#9776;</button>
    <ul class="navbar__links" id="navLinks">
        <li><a href="#" data-page="home" class="nav-link">Główna</a></li>
        <li><a href="#" data-page="dishes" class="nav-link">Dania</a></li>
        <li class="nav-auth-only hidden"><a href="#" data-page="history" class="nav-link">Historia</a></li>
        <li class="nav-auth-only hidden"><a href="#" data-page="lists" class="nav-link">Moje listy</a></li>
        <li class="nav-auth-only hidden"><a href="#" data-page="favorites" class="nav-link">Ulubione</a></li>
        <li class="nav-admin-only hidden"><a href="#" data-page="admin" class="nav-link">Panel admina</a></li>
        <li class="nav-guest-only"><a href="#" data-page="login" class="nav-link btn btn--outline btn--sm">Zaloguj</a></li>
        <li class="nav-guest-only"><a href="#" data-page="register" class="nav-link btn btn--primary btn--sm">Rejestracja</a></li>
        <li class="nav-auth-only hidden">
            <button class="btn btn--ghost btn--sm" id="logoutBtn">Wyloguj</button>
        </li>
    </ul>
</nav>

<!-- TOAST container -->
<div id="toastContainer" class="toast-container"></div>

<!-- MAIN content area (SPA) -->
<main id="app" class="app-content"></main>

<!-- MODAL -->
<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal__overlay" id="modalOverlay"></div>
    <div class="modal__box">
        <button class="modal__close" id="modalClose">&times;</button>
        <div id="modalContent"></div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/wheel.js"></script>
<script src="/js/pages/home.js"></script>
<script src="/js/pages/login.js"></script>
<script src="/js/pages/register.js"></script>
<script src="/js/pages/dishes.js"></script>
<script src="/js/pages/history.js"></script>
<script src="/js/pages/lists.js"></script>
<script src="/js/pages/favorites.js"></script>
<script src="/js/pages/admin.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
