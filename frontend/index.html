<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spin &amp; Eat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/responsive.css" />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎡</text></svg>" />
</head>
<body>

<!-- TOP BAR -->
<header class="topbar" id="topbar">
    <div class="topbar__brand" data-page="home">
        <span class="material-symbols-outlined topbar__icon">restaurant_menu</span>
        <span class="topbar__title">Spin &amp; Eat</span>
    </div>
    <div class="topbar__actions">
        <div class="topbar__pill nav-auth-only hidden" id="mealCountPill">
            <span class="topbar__pill-dot"></span>
            <span id="mealCountLabel">0 meals saved</span>
        </div>
        <button class="topbar__icon-btn nav-auth-only hidden" id="notifBtn" data-i18n-aria="nav.notifications" aria-label="Powiadomienia">
            <span class="material-symbols-outlined">notifications</span>
        </button>
        <button class="topbar__icon-btn" id="langToggleBtn" style="font-size:.8125rem;font-weight:700;letter-spacing:.03em;min-width:2.25rem;" aria-label="Switch language">
            <span id="langLabel">EN</span>
        </button>
        <button class="topbar__icon-btn nav-guest-only" data-page="login" data-i18n-aria="nav.login" aria-label="Zaloguj się">
            <span class="material-symbols-outlined">login</span>
        </button>
    </div>
</header>

<!-- MAIN (SPA content) -->
<main class="app-content" id="app"></main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav__item active" data-page="home">
        <span class="material-symbols-outlined icon-fill">home</span>
        <span class="bottom-nav__label" data-i18n="nav.home">Home</span>
    </button>
    <button class="bottom-nav__item nav-auth-only hidden" data-page="dishes">
        <span class="material-symbols-outlined">restaurant</span>
        <span class="bottom-nav__label" data-i18n="nav.meals">Meals</span>
    </button>
    <button class="bottom-nav__item nav-auth-only hidden" data-page="history">
        <span class="material-symbols-outlined">history</span>
        <span class="bottom-nav__label" data-i18n="nav.history">History</span>
    </button>
    <button class="bottom-nav__item nav-guest-only" data-page="dishes">
        <span class="material-symbols-outlined">restaurant</span>
        <span class="bottom-nav__label" data-i18n="nav.meals">Meals</span>
    </button>
    <button class="bottom-nav__item nav-auth-only hidden" data-page="lists">
        <span class="material-symbols-outlined">format_list_bulleted</span>
        <span class="bottom-nav__label" data-i18n="nav.lists">Lists</span>
    </button>
    <button class="bottom-nav__item nav-auth-only hidden" data-page="profile">
        <span class="material-symbols-outlined">person</span>
        <span class="bottom-nav__label" data-i18n="nav.profile">Profile</span>
    </button>
    <button class="bottom-nav__item nav-guest-only" data-page="login">
        <span class="material-symbols-outlined">person</span>
        <span class="bottom-nav__label" data-i18n="nav.profile">Profile</span>
    </button>
</nav>

<!-- TOAST -->
<div id="toastContainer" class="toast-container"></div>

<!-- MODAL -->
<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal__overlay" id="modalOverlay"></div>
    <div class="modal__box">
        <button class="modal__close" id="modalClose">&times;</button>
        <div id="modalContent"></div>
    </div>
</div>

<script src="/js/locales/pl.js"></script>
<script src="/js/locales/en.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/wheel.js"></script>
<script src="/js/pages/home.js"></script>
<script src="/js/pages/login.js"></script>
<script src="/js/pages/register.js"></script>
<script src="/js/pages/dishes.js"></script>
<script src="/js/pages/history.js"></script>
<script src="/js/pages/lists.js"></script>
<script src="/js/pages/favorites.js"></script>
<script src="/js/pages/profile.js"></script>
<script src="/js/pages/admin.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
