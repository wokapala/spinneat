<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Spin &amp; Eat - Add Meal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#ef9dff",
              "inverse-primary": "#fe6a34",
              "primary-fixed": "#ff7949",
              "on-tertiary": "#ffeefc",
              "secondary-dim": "#902c2a",
              "surface-variant": "#e3dbd7",
              "on-secondary-fixed": "#6a0f12",
              "inverse-surface": "#100e0c",
              "secondary": "#a03834",
              "on-primary-container": "#451000",
              "error-dim": "#9f0519",
              "surface-container-highest": "#e3dbd7",
              "on-primary": "#ffefeb",
              "on-secondary-container": "#852422",
              "on-tertiary-container": "#5e1470",
              "secondary-fixed": "#ffc3be",
              "surface-bright": "#fcf5f1",
              "primary": "#a63300",
              "surface-container-low": "#f6efeb",
              "outline-variant": "#b2aca9",
              "on-error": "#ffefee",
              "on-background": "#312e2c",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#ffafa9",
              "on-secondary": "#ffefed",
              "surface-dim": "#dad3ce",
              "error": "#b31b25",
              "tertiary-dim": "#78308a",
              "on-surface": "#312e2c",
              "secondary-container": "#ffc3be",
              "primary-dim": "#922c00",
              "primary-fixed-dim": "#f7652f",
              "primary-container": "#ff7949",
              "background": "#fcf5f1",
              "surface-tint": "#a63300",
              "tertiary": "#853d97",
              "on-error-container": "#570008",
              "on-secondary-fixed-variant": "#912d2b",
              "surface": "#fcf5f1",
              "on-primary-fixed-variant": "#551600",
              "tertiary-fixed-dim": "#e190f1",
              "on-tertiary-fixed-variant": "#681f7a",
              "surface-container": "#eee7e2",
              "on-primary-fixed": "#000000",
              "error-container": "#fb5151",
              "surface-container-high": "#e8e1dc",
              "on-tertiary-fixed": "#400050",
              "tertiary-container": "#ef9dff",
              "on-surface-variant": "#5f5b58",
              "inverse-on-surface": "#a19c99",
              "outline": "#7a7673"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #a63300 0%, #ff7949 100%);
        }
        .glass-nav {
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen pb-32">
<!-- Top AppBar -->
<header class="sticky top-0 z-40 bg-[#fcf5f1] dark:bg-stone-950">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#a63300] dark:text-[#ff7949]">restaurant_menu</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl font-extrabold text-[#a63300] dark:text-[#ff7949]">Spin &amp; Eat</h1>
</div>
<button class="text-on-surface-variant hover:opacity-80 active:scale-95 duration-200">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto px-6 pt-8 space-y-10">
<!-- Header Section -->
<section class="space-y-2">
<h2 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface">New Meal</h2>
<p class="text-on-surface-variant font-medium">Add a fresh dish to your culinary wheel.</p>
</section>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-DEFAULT p-6 shadow-[0_24px_48px_rgba(166,51,0,0.04)] space-y-8">
<!-- Meal Name Input -->
<div class="space-y-3">
<label class="font-headline text-sm font-bold tracking-wide uppercase text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">edit</span>
                    Meal name
                </label>
<input class="w-full bg-surface-container-low border-none rounded-DEFAULT px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container font-medium placeholder:text-outline/50 transition-all" placeholder="e.g. Grandma's Pierogi" type="text"/>
</div>
<!-- Cuisine Type Chips -->
<div class="space-y-4">
<label class="font-headline text-sm font-bold tracking-wide uppercase text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">public</span>
                    Cuisine type
                </label>
<div class="flex flex-wrap gap-2">
<!-- Selected Chip -->
<button class="bg-primary text-on-primary px-5 py-2.5 rounded-full text-sm font-semibold transition-transform active:scale-95">Polish</button>
<!-- Unselected Chips -->
<button class="bg-surface-container text-on-surface-variant px-5 py-2.5 rounded-full text-sm font-medium hover:bg-surface-container-high transition-colors active:scale-95">Italian</button>
<button class="bg-surface-container text-on-surface-variant px-5 py-2.5 rounded-full text-sm font-medium hover:bg-surface-container-high transition-colors active:scale-95">Asian</button>
<button class="bg-surface-container text-on-surface-variant px-5 py-2.5 rounded-full text-sm font-medium hover:bg-surface-container-high transition-colors active:scale-95">American</button>
<button class="bg-surface-container text-on-surface-variant px-5 py-2.5 rounded-full text-sm font-medium hover:bg-surface-container-high transition-colors active:scale-95">Other</button>
</div>
</div>
<!-- Emoji Picker Grid -->
<div class="space-y-4">
<label class="font-headline text-sm font-bold tracking-wide uppercase text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">mood</span>
                    Meal emoji
                </label>
<div class="grid grid-cols-4 gap-3">
<button class="aspect-square flex items-center justify-center text-2xl bg-primary-container/20 rounded-DEFAULT ring-2 ring-primary">🥟</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🍕</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🍜</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🍔</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🌮</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🥗</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🍝</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🍣</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🍲</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🥘</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🍛</button>
<button class="aspect-square flex items-center justify-center text-2xl bg-surface-container-low rounded-DEFAULT hover:bg-surface-container-high transition-colors">🍱</button>
</div>
</div>
<!-- Notes Field -->
<div class="space-y-3">
<label class="font-headline text-sm font-bold tracking-wide uppercase text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">notes</span>
                    Notes (optional)
                </label>
<textarea class="w-full bg-surface-container-low border-none rounded-DEFAULT px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container font-medium placeholder:text-outline/50 transition-all resize-none" placeholder="Add ingredients or specific memories..." rows="3"></textarea>
</div>
</div>
<!-- Submit Button -->
<button class="w-full signature-gradient text-on-primary py-5 rounded-DEFAULT font-headline font-bold text-lg shadow-[0_12px_24px_rgba(166,51,0,0.25)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>Save meal</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-50 flex justify-around items-center p-2 bg-[#ff7949]/80 dark:bg-[#a63300]/80 backdrop-blur-xl fixed bottom-6 mx-auto w-[92%] left-0 right-0 rounded-full shadow-[0_24px_48px_rgba(166,51,0,0.1)]">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-white/70 px-5 py-2 hover:bg-white/10 transition-transform active:scale-90 rounded-full" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-medium">Home</span>
</a>
<!-- Meals (Active) -->
<a class="flex flex-col items-center justify-center bg-white/20 dark:bg-black/20 rounded-full px-5 py-2 text-white transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-medium">Meals</span>
</a>
<!-- History -->
<a class="flex flex-col items-center justify-center text-white/70 px-5 py-2 hover:bg-white/10 transition-transform active:scale-90 rounded-full" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-medium">History</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-white/70 px-5 py-2 hover:bg-white/10 transition-transform active:scale-90 rounded-full" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-medium">Profile</span>
</a>
</nav>
</body></html>
